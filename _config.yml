# Cookie Farm Reports — Jekyll config
title: "🍪 Cookie Farm Dashboard"
description: "Automated daily cookie farm reports — profiles, cookies, domains trend"
baseurl: "/cookie-farm-reports"
url: "https://tr1ckymast3r.github.io"

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Navigation
show_downloads: false
github:
  repository_url: https://github.com/tr1ckymast3r/anti-detect-cookies

# Build settings
markdown: kramdown
kramdown:
  parse_block_html: true

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
